<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HSHiPad 3 Gold Tracker </title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.bundle.min.js"></script>
    <style>
        body {
            background-color: #111827;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 10px;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        .header {
            color: #f59e0b;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }

        .card {
            background-color: #374151;
            border-radius: 15px;
            padding: 5px;
            margin-bottom: 5px;
            text-align: center;
        }

        .label {
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 1px;
        }

        .flex-row {
            display: table;
            width: 100%;
        }

        .flex-col {
            display: table-cell;
            width: 50%;
            vertical-align: middle;
        }

        .divider {
            border-left: 1px solid #4b5563;
            height: 50px;
            display: table-cell;
        }

        .price-red {
            color: #ef4444;
            font-size: 62px;
            font-weight: bold;
            margin: 1px 0;
        }

        .price-green {
            color: #10b981;
            font-size: 62px;
            font-weight: bold;
            margin: 1px 0;
        }

        .price-white {
            color: white;
            font-size: 52px;
            font-weight: bold;
            margin: 1px 0;
        }

        .grid {
            display: block;
            overflow: hidden;
        }

        .grid-item {
            float: left;
            width: 48%;
            background: #374151;
            border-radius: 15px;
            padding: 10px 1%;
            margin: 1%;
            box-sizing: border-box;
        }

        .chart-box {
            background: #1f2937;
            border-radius: 10px;
            padding: 5px;
            margin-top: 5px;
            height: 250px;
        }

        .status {
            color: #6b7280;
            font-size: 12px;
            font-style: italic;
            text-align: center;
            margin: 10px 0;
        }

        button {
            width: 100%;
            background: #b45309;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">ฮั่วเซ่งเฮง</div>

        <div class="card">
            <div class="label">ทองแท่ง 96.5%</div>
            <div class="flex-row">
                <div class="flex-col">
                    <div style="color:#f87171">รับซื้อ</div>
                    <div id="bid965" class="price-red">---</div>
                </div>
                <div class="divider"></div>
                <div class="flex-col">
                    <div style="color:#34d399">ขายออก</div>
                    <div id="ask965" class="price-green">---</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="label">สมาคม 96.5%</div>
            <div class="flex-row">
                <div class="flex-col">
                    <div style="color:#f87171">รับซื้อ</div>
                    <div id="BidAssociation" class="price-red">---</div>
                </div>
                <div class="divider"></div>
                <div class="flex-col">
                    <div style="color:#34d399">ขายออก</div>
                    <div id="AskAssociation" class="price-green">---</div>
                </div>
            </div>
        </div>

        <div class="grid">
            <div class="grid-item">
                <div class="label">Spot Gold ($)</div>
                <div id="spot" class="price-white" style="font-size: 44px;">---</div>
            </div>
            <div class="grid-item">
                <div class="label">USD/THB</div>
                <div id="fx" class="price-white" style="font-size: 44px;">---</div>
            </div>
        </div>

        <div class="chart-box">
            <div style="color:#ffd700; text-align:center; font-size:14px; margin-bottom:5px;">Spot Gold Trend (24h)
            </div>
            <canvas id="historyChart"></canvas>
        </div>

        <p id="updateTime" class="status">กำลังโหลดข้อมูล...</p>
        <button onclick="fetchAllData()">Refresh Now</button>
    </div>

    <script>
        var historyChart = null;
        var oldSpotPrice = 0;
        var fxRate = 0;
        // *** สำคัญ: ใส่ URL Google Apps Script Proxy ของคุณที่นี่ ***
        var proxyUrl = "https://script.google.com/macros/s/AKfycbwYGBFnfZfb-3EwUhCQ5S74tzN9OG7PsyO9Cstf204/dev";

        function fetchAllData() {
            fetchHSH();
            fetchFX();
            fetchSpot();
            fetchHistory();
        }

        // *** สำคัญที่สุด: ใส่ URL ของ Google Apps Script ที่คุณ Deploy ไว้ที่นี่ ***
        //         var proxyUrl = "https://script.google.com/macros/s/AKfycbwYGBFnfZfb-3EwUhCQ5S74tzN9OG7PsyO9Cstf204/dev";

    function fetchHSH() {
        var directUrl = "https://apicheckpricev3.huasengheng.com/api/Values/GetPrice";
        var xhr = new XMLHttpRequest();
        xhr.open("GET", directUrl, true);
        xhr.onreadystatechange = function () {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    try {
                        var data = JSON.parse(xhr.responseText);

                        // ค้นหาข้อมูล HSH และ REF จาก Array ที่ API ส่งมา
                        var hshData = null;
                        var refData = null;

                        for (var i = 0; i < data.length; i++) {
                            if (data[i].GoldType === "HSH") hshData = data[i];
                            if (data[i].GoldType === "REF") refData = data[i];
                        }

                        // แสดงผลราคา HSH
                        if (hshData) {
                            document.getElementById('ask965').innerText = hshData.Sell;
                            document.getElementById('bid965').innerText = hshData.Buy;
                        }

                        // แสดงผลราคาสมาคม (REF)
                        if (refData) {
                            document.getElementById('AskAssociation').innerText = refData.Sell;
                            document.getElementById('BidAssociation').innerText = refData.Buy;
                        }

                        document.getElementById('updateTime').innerText = "อัปเดตล่าสุด: " + new Date().toLocaleTimeString();
                    } catch (e) {
                        console.log("JSON Parse Error");
                        document.getElementById('updateTime').innerText = "Data Error";
                    }
                } else {
                    // ถ้าติด CORS หรือ Error อื่นๆ จะมาตกที่นี่
                    console.log("HTTP Error: " + xhr.status);
                    document.getElementById('updateTime').innerText = "CORS / Connection Error (" + xhr.status + ")";
                }
            }
        };
        xhr.send();
    }

        function fetchFX() {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", "https://api.coinbase.com/v2/exchange-rates?currency=USD", true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var res = JSON.parse(xhr.responseText);
                    fxRate = parseFloat(res.data.rates.THB);
                    document.getElementById('fx').innerText = fxRate.toFixed(2);
                }
            };
            xhr.send();
        }

        function fetchSpot() {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", "https://api.coinbase.com/v2/prices/PAXG-USD/spot", true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var res = JSON.parse(xhr.responseText);
                    var price = parseFloat(res.data.amount);
                    var el = document.getElementById('spot');
                    el.innerText = price.toFixed(2);
                    if (oldSpotPrice > 0) {
                        el.style.color = (price > oldSpotPrice) ? "#4ade80" : (price < oldSpotPrice ? "#f87171" : "white");
                    }
                    oldSpotPrice = price;
                }
            };
            xhr.send();
        }

        function fetchHistory() {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", "https://api.exchange.coinbase.com/products/PAXG-USD/candles?granularity=3600", true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var data = JSON.parse(xhr.responseText).slice(0, 24).reverse();
                    var labels = [];
                    var prices = [];
                    for (var i = 0; i < data.length; i++) {
                        var d = new Date(data[i][0] * 1000);
                        labels.push(d.getHours() + ":00");
                        prices.push(data[i][4]);
                    }
                    renderChart(labels, prices);
                }
            };
            xhr.send();
        }

        function renderChart(labels, prices) {
            var ctx = document.getElementById('historyChart').getContext('2d');
            var isUp = prices[prices.length - 1] >= prices[0];
            var color = isUp ? '#00ff88' : '#ff4444';

            if (historyChart) historyChart.destroy();
            historyChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: prices,
                        borderColor: color,
                        backgroundColor: isUp ? 'rgba(0,255,136,0.1)' : 'rgba(255,68,68,0.1)',
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: true,
                        lineTension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    legend: { display: false },
                    scales: {
                        xAxes: [{ ticks: { fontColor: '#666', fontSize: 10, maxTicksLimit: 6 }, gridLines: { display: false } }],
                        yAxes: [{ ticks: { fontColor: '#666', fontSize: 10 }, gridLines: { color: '#333' } }]
                    }
                }
            });
        }

        // เริ่มต้นทำงาน
        fetchAllData();
        setInterval(fetchAllData, 60000); // อัปเดตทุก 1 นาที
    </script>
</body>
  

</html>
